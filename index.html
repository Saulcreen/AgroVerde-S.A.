<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroVerde S.A. — Campo de 12 Hectáreas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --tech:#22d3c7;
    --panel-bg:rgba(18,26,22,0.78);
    --panel-border:rgba(34,211,199,0.28);
    --ink:#eef4ef;
    --ink-dim:#9fb3a8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;
    font-family:'Space Grotesk',sans-serif;background:#0c1210;color:var(--ink);}

  #c{position:fixed;top:0;left:0;width:100%;height:100%;display:block;cursor:grab;}
  #c.dragging{cursor:grabbing;}

  #header{
    position:fixed;top:18px;left:18px;z-index:5;max-width:360px;pointer-events:none;
  }
  #header .eyebrow{
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;
    color:var(--tech);text-transform:uppercase;opacity:.9;
  }
  #header h1{margin:4px 0 2px;font-size:22px;font-weight:700;line-height:1.15;
    text-shadow:0 2px 12px rgba(0,0,0,.5);}
  #header p{margin:0;font-size:12.5px;color:var(--ink-dim);line-height:1.4;
    text-shadow:0 1px 8px rgba(0,0,0,.5);}

  #controls{
    position:fixed;bottom:18px;left:18px;z-index:5;display:flex;gap:8px;
  }
  #controls button{
    font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:500;
    padding:9px 14px;border-radius:999px;border:1px solid var(--panel-border);
    background:var(--panel-bg);color:var(--ink);cursor:pointer;backdrop-filter:blur(10px);
    transition:background .15s ease;
  }
  #controls button:hover{background:rgba(34,211,199,.18);}
  #controls button.active{background:rgba(34,211,199,.35);border-color:var(--tech);}

  #legend{
    position:fixed;bottom:18px;right:18px;z-index:5;
    background:var(--panel-bg);border:1px solid var(--panel-border);
    border-radius:12px;padding:10px 14px;font-size:11px;color:var(--ink-dim);
    font-family:'IBM Plex Mono',monospace;line-height:1.9;backdrop-filter:blur(10px);
  }
  #legend b{color:var(--tech);}

  #hint{
    position:fixed;bottom:78px;left:18px;z-index:4;font-size:10.5px;color:var(--ink-dim);
    font-family:'IBM Plex Mono',monospace;opacity:.7;
  }
</style>
</head>
<body>

<div id="header">
  <div class="eyebrow">AgroVerde S.A.</div>
  <h1>Campo de 12 hectáreas</h1>
  <p>Simulación 3D de los 12 lotes de cultivo de hortalizas (lechuga, tomate y pimiento).</p>
</div>

<div id="controls">
  <button id="btnRotate">⟳ Auto-rotar</button>
</div>

<div id="legend">
  <div><b>12</b> lotes de 1 ha</div>
  <div><b>3</b> variedades de hortalizas</div>
</div>

<div id="hint">arrastra para rotar · scroll para zoom</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  "use strict";

  /* ---------- Escena base ---------- */
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  const scene = new THREE.Scene();

  // cielo degradado
  (function(){
    const c = document.createElement('canvas'); c.width=8; c.height=256;
    const ctx = c.getContext('2d');
    const g = ctx.createLinearGradient(0,0,0,256);
    g.addColorStop(0,'#bfe3f0'); g.addColorStop(0.55,'#dcefe0'); g.addColorStop(1,'#f2e4c9');
    ctx.fillStyle=g; ctx.fillRect(0,0,8,256);
    scene.background = new THREE.CanvasTexture(c);
  })();
  scene.fog = new THREE.Fog(0xdcefe0, 260, 620);

  const camera = new THREE.PerspectiveCamera(48, window.innerWidth/window.innerHeight, 1, 2000);

  // luces
  scene.add(new THREE.HemisphereLight(0xdcefe0, 0x5b4636, 0.65));
  const sun = new THREE.DirectionalLight(0xfff4da, 1.05);
  sun.position.set(180, 260, 120);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048,2048);
  sun.shadow.camera.left = -260; sun.shadow.camera.right = 260;
  sun.shadow.camera.top = 220; sun.shadow.camera.bottom = -220;
  sun.shadow.camera.far = 700;
  scene.add(sun);

  /* ---------- Cámara orbital manual ---------- */
  const target = new THREE.Vector3(0,6,0);
  let radius = 340, theta = Math.PI*0.28, phi = Math.PI*0.32;
  let autoRotate = false, dragging = false, lastX=0, lastY=0;

  function updateCamera(){
    const sinPhi = Math.sin(phi);
    camera.position.x = target.x + radius * sinPhi * Math.sin(theta);
    camera.position.y = target.y + radius * Math.cos(phi);
    camera.position.z = target.z + radius * sinPhi * Math.cos(theta);
    camera.lookAt(target);
  }

  canvas.addEventListener('mousedown', e=>{dragging=true;lastX=e.clientX;lastY=e.clientY;canvas.classList.add('dragging');});
  window.addEventListener('mouseup', ()=>{dragging=false;canvas.classList.remove('dragging');});
  window.addEventListener('mousemove', e=>{
    if(!dragging) return;
    const dx = e.clientX-lastX, dy = e.clientY-lastY;
    lastX=e.clientX; lastY=e.clientY;
    theta -= dx*0.0055;
    phi -= dy*0.0045;
    phi = Math.max(0.18, Math.min(1.30, phi));
  });
  canvas.addEventListener('wheel', e=>{
    e.preventDefault();
    radius += e.deltaY*0.4;
    radius = Math.max(90, Math.min(560, radius));
  }, {passive:false});
  let touchStartDist=null;
  canvas.addEventListener('touchstart', e=>{
    if(e.touches.length===1){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;}
    else if(e.touches.length===2){touchStartDist=dist(e.touches[0],e.touches[1]);}
  });
  canvas.addEventListener('touchmove', e=>{
    if(e.touches.length===1 && dragging){
      const dx=e.touches[0].clientX-lastX, dy=e.touches[0].clientY-lastY;
      lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
      theta -= dx*0.006; phi -= dy*0.005;
      phi = Math.max(0.18, Math.min(1.30, phi));
    } else if(e.touches.length===2 && touchStartDist){
      const d = dist(e.touches[0],e.touches[1]);
      radius += (touchStartDist-d)*0.5;
      radius = Math.max(90, Math.min(560, radius));
      touchStartDist = d;
    }
    e.preventDefault();
  }, {passive:false});
  canvas.addEventListener('touchend', ()=>{dragging=false;touchStartDist=null;});
  function dist(a,b){return Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);}

  /* ---------- Sprite de texto (billboard) ---------- */
  function makeLabel(text, opts){
    opts = opts||{};
    const scale = opts.scale || 1;
    const c = document.createElement('canvas');
    const ctx = c.getContext('2d');
    const fontSize = opts.fontSize||34;
    ctx.font = `600 ${fontSize}px 'IBM Plex Mono', monospace`;
    const w = Math.max(ctx.measureText(text).width + 40, 60);
    c.width = w; c.height = fontSize*1.9;
    ctx.font = `600 ${fontSize}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = opts.bg || 'rgba(12,18,15,0.72)';
    roundRect(ctx, 0,0, c.width, c.height, 14); ctx.fill();
    ctx.fillStyle = opts.color || '#eef4ef';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 20, c.height/2+2);
    const tex = new THREE.CanvasTexture(c);
    tex.minFilter = THREE.LinearFilter;
    const mat = new THREE.SpriteMaterial({map:tex, depthTest:false, transparent:true});
    const spr = new THREE.Sprite(mat);
    const ratio = c.width/c.height;
    spr.scale.set(ratio*6*scale, 6*scale, 1);
    spr.renderOrder = 10;
    return spr;
  }
  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  /* ---------- Terreno: 12 lotes de 1 ha (100m x 100m) => 4 x 3 = 12 ha ---------- */
  const COLS = 4, ROWS = 3, CELL = 92, GAP = 6;
  const fieldW = COLS*(CELL+GAP), fieldD = ROWS*(CELL+GAP);
  const originX = -fieldW/2 + (CELL+GAP)/2;
  const originZ = -fieldD/2 + (CELL+GAP)/2;

  const groundGeo = new THREE.PlaneGeometry(fieldW+140, fieldD+140, 1,1);
  const groundMat = new THREE.MeshStandardMaterial({color:0x86a56b, roughness:1});
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI/2;
  ground.receiveShadow = true;
  ground.position.y = -0.05;
  scene.add(ground);

  const cropTypes = [
    {name:'Lechuga', color:0x5aa84c, height:2.4, shape:'sphere'},
    {name:'Tomate',  color:0xb8482f, height:3.4, shape:'cone'},
    {name:'Pimiento',color:0xd98a2b, height:2.9, shape:'cone'}
  ];

  const rowLetters = ['A','B','C'];
  let plotIndex=0;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const cx = originX + c*(CELL+GAP);
      const cz = originZ + r*(CELL+GAP);
      const crop = cropTypes[plotIndex % cropTypes.length];
      buildPlot(cx, cz, CELL, crop, `${rowLetters[r]}${c+1}`);
      plotIndex++;
    }
  }

  function buildPlot(cx, cz, size, crop, label){
    const group = new THREE.Group();
    group.position.set(cx, 0, cz);
    scene.add(group);

    // suelo del lote
    const soilGeo = new THREE.PlaneGeometry(size, size, 1,1);
    const soilMat = new THREE.MeshStandardMaterial({color:0x5b4636, roughness:1});
    const soil = new THREE.Mesh(soilGeo, soilMat);
    soil.rotation.x = -Math.PI/2;
    soil.receiveShadow = true;
    soil.position.y = 0.02;
    group.add(soil);

    // surcos
    const furrowMat = new THREE.MeshStandardMaterial({color:0x4a3a2c, roughness:1});
    const rows = 9;
    for(let i=0;i<rows;i++){
      const fg = new THREE.BoxGeometry(size-6, 0.4, 1.6);
      const f = new THREE.Mesh(fg, furrowMat);
      f.position.set(0, 0.05, -size/2 + 6 + i*((size-12)/(rows-1)));
      f.receiveShadow = true;
      group.add(f);
    }

    // cultivos: instancedMesh
    const perRow = 8, nRows = rows;
    const count = perRow*nRows;
    let geo;
    if(crop.shape==='sphere') geo = new THREE.SphereGeometry(1.15, 8, 6);
    else geo = new THREE.ConeGeometry(1.05, crop.height, 7);
    const mat = new THREE.MeshStandardMaterial({color:crop.color, roughness:0.85});
    const inst = new THREE.InstancedMesh(geo, mat, count);
    inst.castShadow = true;
    inst.receiveShadow = true;
    const dummy = new THREE.Object3D();
    let idx=0;
    for(let i=0;i<nRows;i++){
      const z = -size/2 + 6 + i*((size-12)/(nRows-1));
      for(let j=0;j<perRow;j++){
        const x = -size/2 + 8 + j*((size-16)/(perRow-1)) + (Math.random()-0.5)*2.4;
        dummy.position.set(x, crop.height*0.42, z + (Math.random()-0.5)*1.2);
        const s = 0.75 + Math.random()*0.5;
        dummy.scale.set(s, s*(0.85+Math.random()*0.3), s);
        dummy.rotation.y = Math.random()*Math.PI;
        dummy.updateMatrix();
        inst.setMatrixAt(idx, dummy.matrix);
        idx++;
      }
    }
    group.add(inst);

    // etiqueta del lote
    const lbl = makeLabel(`LOTE ${label} · ${crop.name}`, {scale:0.85, color:'#eef4ef'});
    lbl.position.set(0, 16, 0);
    group.add(lbl);
  }

  /* ---------- Controles UI ---------- */
  const btnRotate = document.getElementById('btnRotate');
  btnRotate.addEventListener('click', ()=>{
    autoRotate = !autoRotate;
    btnRotate.classList.toggle('active', autoRotate);
  });

  /* ---------- Loop de render ---------- */
  const clock = new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    if(autoRotate && !dragging) theta += dt*0.14;
    updateCamera();
    renderer.render(scene, camera);
  }
  updateCamera();
  animate();

  window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

})();
</script>
</body>
</html>
